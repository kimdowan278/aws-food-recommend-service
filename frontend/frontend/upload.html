<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사진 업로드</title>

    <link
        rel="stylesheet"
        href="css/upload.css">
</head>

<body>

<header>

    <h1>Food AI</h1>

<nav>
    <a href="index.html">Home</a>
    <a href="upload.html">업로드</a>
    <a href="recommend.html">추천</a>
    <a href="history.html">내 기록</a>
</nav>

</header>

<div class="container">

    <div class="upload-card">

        <h2>
            음식 사진 업로드
        </h2>

        <p>
            AI가 이미지를 분석하여
            맛집을 추천합니다.
        </p>

        <div class="preview-box">

            <img
                id="previewImage"
                src=""
                alt="preview"
                style="display:none;">
            

        </div>

        <input
            type="file"
            id="imageInput"
            accept="image/*">

        <div class="input-group">

    <label for="region">
        지역
    </label>

    <select id="region">

        <option>서울</option>
        <option>부산</option>
        <option>대구</option>
        <option>제주</option>

    </select>

</div>

<div class="input-group">

    <label for="memo">
        메모
    </label>

<textarea
    id="memo"
    placeholder="상세한 추천을 위해 음식 정보를 입력해주세요. 예) 매운 떡볶이"></textarea>

</div>

        <button id="analyzeBtn">
            분석 시작하기
        </button>

    </div>

</div>

<script src="js/upload.js"></script>

</body>
</html>
