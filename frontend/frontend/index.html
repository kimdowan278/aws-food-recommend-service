<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food AI Recommendation</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">

    <div class="logo">
        FoodAI
    </div>

    <nav>
        <a href="#">홈</a>
        <a href="#">추천</a>
        <a href="#">내 기록</a>
        <a href="#">로그인</a>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>
            음식 사진 한 장으로<br>
            맛집을 찾아보세요
        </h1>

        <p>
            AWS Rekognition 기반 AI 음식 분석 서비스
        </p>

        <button id="uploadBtn">
            사진 업로드 시작하기
        </button>

    </div>

</section>

<section class="categories">

    <h2>인기 음식 카테고리</h2>

    <div class="category-list">

        <div class="category">한식</div>
        <div class="category">일식</div>
        <div class="category">중식</div>
        <div class="category">양식</div>
        <div class="category">카페</div>
        <div class="category">디저트</div>

    </div>

</section>

<section class="recommend">

    <h2>오늘의 추천 맛집</h2>

    <div class="card-container" id="restaurantContainer">

    </div>

</section>

<footer>

    <p>
        AWS Rekognition Food Recommendation Project
    </p>

</footer>

<script src="js/main.js"></script>
